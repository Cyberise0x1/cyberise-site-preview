<style>
:root {
  --bg:#0F0F0F;--panel:#161616;--panel-2:#1c1c1c;--border:#2a2a2a;

  --client:#4ea1ff;--route:#7bd389;--service:#c792ea;--db:#ffb86b;

*{margin:0;padding:0;box-sizing:border-box}
body{background:our(--bg);color:our(--text);font-family:system-ui,-apple-system,sans-serif;overflow:hidden;height:100vh}
#app{display:flex;height:100vh}
#toolbar{position:absolute;top:12px;left:16px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:14px;border:1px solid our(--border);background:our(--panel);color:our(--muted);cursor:pointer;font-size:12px;white-space:nowrap;transition:all .15s}
.chip.active{color:#fff;border-color:our(--accent);background:#2a1f00}
#canvas wrap{flex:1;position:relative;overflow:hidden}
#svg-container{width:100%;height:100%}
svg{width:100%;height:100%}
#sidebar{width:340px;min-width:340px;background:our(--panel);border-left:1px solid our(--border);overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
#sidebar h3{font-size:14px;color:our(--muted);text-transform:uppercase;letter-spacing:1px}
#sidebar .node-title{font-size:18px;font-weight:600}
#sidebar .node-path{font-family:minivan;font-size:12px;color:our(--muted);word-break:break-all}
#sidebar .node-section{margin-bottom:4px}
#sidebar .node-section h4{font-size:11px;text-transform:uppercase;color:our(--muted);margin-bottom:4px}
#sidebar .node-notes{list-style:none;padding:0}
#sidebar .node-notes li{font-size:12px;color:our(--text);padding:3px 0;border-bottom:1px solid our(--border)}
#sidebar .default-view p{font-size:13px;color:our(--text);line-height:1.5}
#sidebar .default-view .finding{border-left:2px solid our(--accent);padding:8px 12px;margin:8px 0;background:our(--panel-2);border-radius:4px;font-size:12px}
#sidebar .default-view .finding .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;margin-right:6px}
#sidebar .default-view .finding .tag.dead{background:#ff444420;color:#ff4444}
#sidebar .default-view .finding .tag.hot{background:#ff386020;color:#ff3860}
#sidebar .default-view .finding .tag.warn{background:#f5b94220;color:#f5b942}
#sidebar .edge-list{list-style:none;padding:0}
#sidebar .edge-list li{font-size:12px;padding:2px 0;display:flex;gap:6px;align-items:baseline}
.edge-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.badge{font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center}
.badge.fix{background:#4ea1ff20;color:#4ea1ff}
.badge.bug{background:#ff386020;color:#ff3860}
.cluster-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;fill:var(--muted)}
.node-rect{cursor:pointer;transition:opacity .2s}
.node-label{font-size:12px;font-weight:600;fill:var(--text);pointer-events:none}
.node-sub{font-size:10px;fill:var(--muted);pointer-events:none}
.node-dim{opacity:.25}
.edge-path{fill:none;stroke-width:1.2;pointer-events:stroke}
.edge-path.critical{stroke:var(--critical);stroke-width:2.2}
.edge-path.api{stroke:var(--external)}
.edge-path.db{stroke:var(--db)}
.edge-path.mount{stroke:var(--route)}
.edge-path.normal{stroke:#444}
.edge-label{font-size:9px;fill:var(--muted)}
.legend{position:absolute;bottom:12px;right:16px;display:flex;gap:12px;background:var(--panel);padding:6px 12px;border-radius:8px;border:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.legend-line{width:18px;height:2px;border-radius:1px}
.zoom-controls{position:absolute;bottom:12px;left:16px;display:flex;gap:4px}
.zoom-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{background:var(--panel-2)}
</style>
</head>

function init() {
  svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${SVGW} ${SVGH}`);
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');

  // defs
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  const mk = (id,color) => {
    const m = document.createElementNS('http://www.w3.org/2000/svg','marker');
    m.setAttribute('id',id);
    m.setAttribute('markerWidth','6');
    m.setAttribute('markerHeight','6');
    m.setAttribute('refX','5');
    m.setAttribute('refY','3');
    m.setAttribute('orient','auto');
    const p = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points','0 0, 6 3, 0 6');
    p.setAttribute('fill',color);
    m.appendChild(p);
    return m;
  };
  defs.appendChild(mk('arrow-critical','var(--critical)'));
  defs.appendChild(mk('arrow-api','var(--external)'));
  defs.appendChild(mk('arrow-db','var(--db)'));
  defs.appendChild(mk('arrow-mount','var(--route)'));
  defs.appendChild(mk('arrow-normal','#444'));
  svg.appendChild(defs);

  svgGroup = document.createElementNS('http://www.w3.org/2000/svg','g');

function renderAll() {
  svgGroup.innerHTML = '';
  // cluster backgrounds
  clusters.forEach(c=>{
    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',c.x);r.setAttribute('y',c.y);
    r.setAttribute('width',c.w);r.setAttribute('height',c.h||600);
    r.setAttribute('rx','8');r.setAttribute('ry','8');
    r.setAttribute('fill','var(--panel)');
    r.setAttribute('stroke','var(--border)');
    r.setAttribute('stroke-width','1');
    r.setAttribute('stroke-dasharray','4 3');
    svgGroup.appendChild(r);
    // label
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',c.x+8);t.setAttribute('y',c.y-8);
    t.setAttribute('class','cluster-label');
    t.textContent = c.label;
    svgGroup.appendChild(t);
  });

  // edges
  const activeTags = activeFilter==='all'?chips.map(c=>c.id):[activeFilter,'all'];

  edges.forEach(e=>{
    if(!e.tag.some(t=>activeTags.includes(t))) return;
    const fn = nodes.find(n=>n.id===e.from);
    const tn = nodes.find(n=>n.id===e.to);
    if(!fn||!tn) return;

    const x1 = clusterX(fn.cluster)+fn.x+fn.w;
    const y1 = clusterY(fn.cluster)+fn.y+fn.h/2;
    const x2 = clusterX(tn.cluster)+tn.x;
    const y2 = clusterY(tn.cluster)+tn.y+tn.h/2;
    const mx = (x1+x2)/2;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    const d = `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
    path.setAttribute('d',d);
    path.setAttribute('class',`edge-path ${e.kind}`);
    const arrowMap = {critical:'arrow-critical',api:'arrow-api',db:'arrow-db',mount:'arrow-mount',normal:'arrow-normal'};
    path.setAttribute('marker-end',`url(#${arrowMap[e.kind]||'arrow-normal'})`);

    if(e.kind==='critical'){
      // Add glow effect
      const glow = document.createElementNS('http://www.w3.org/2000/svg','path');
      glow.setAttribute('d',d);
      glow.setAttribute('class','edge-path critical');
      glow.setAttribute('stroke-width','6');
      glow.setAttribute('opacity','0.3');
      glow.setAttribute('marker-end','none');
      svgGroup.appendChild(glow);
    }

    svgGroup.appendChild(path);
  });

  // edge labels
  const edgeLabelsByGap = {};
  edges.forEach(e=>{
    if(!e.tag.some(t=>activeTags.includes(t))) return;
    const fn = nodes.find(n=>n.id===e.from);
    const tn = nodes.find(n=>n.id===e.to);
    if(!fn||!tn) return;
    const x1 = clusterX(fn.cluster)+fn.x+fn.w;
    const y1 = clusterY(fn.cluster)+fn.y+fn.h/2;
    const x2 = clusterX(tn.cluster)+tn.x;
    const y2 = clusterY(tn.cluster)+tn.y+tn.h/2;
    const mx = (x1+x2)/2;
    const my = (y1+y2)/2;

    const gapX = Math.round(mx/30)*30;
    if(!edgeLabelsByGap[gapX]) edgeLabelsByGap[gapX] = [];
    edgeLabelsByGap[gapX].push({label:e.label, mx,my});
  });

  Object.values(edgeLabelsByGap).forEach(labels=>{
    labels.forEach((l,i)=>{
      const dy = (i - (labels.length-1)/2)*14;
      const lines = l.label.split('\n');
      lines.forEach((line,li)=>{
        const t = document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x',l.mx);
        t.setAttribute('y',l.my+dy+li*10-(lines.length-1)*5);
        t.setAttribute('text-anchor','middle');
        t.setAttribute('class','edge-label');
        t.textContent = line;
        svgGroup.appendChild(t);
      });
    });
  });

  // nodes
  nodes.forEach(n=>{
    const nx = clusterX(n.cluster)+n.x;
    const ny = clusterY(n.cluster)+n.y;
    const isDead = n.id==='svc-linode-dead';
    const hasBadge = FIXES[n.id]||KNOWN_BUGS[n.id];

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('data-node-id',n.id);

    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',nx);r.setAttribute('y',ny);
    r.setAttribute('width',n.w);r.setAttribute('height',n.h);
    r.setAttribute('rx','5');r.setAttribute('ry','5');
    r.setAttribute('fill',isDead?'#ff444410':'var(--panel-2)');
    r.setAttribute('stroke',n.color);
    r.setAttribute('stroke-width',n.critical?'2.5':'1.5');
    r.setAttribute('class','node-rect');
    r.setAttribute('data-node-id',n.id);
    g.appendChild(r);

    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',nx+8);t.setAttribute('y',ny+16);
    t.setAttribute('class','node-label');
    t.textContent = n.label;
    g.appendChild(t);

    if(n.sub){
      const s = document.createElementNS('http://www.w3.org/2000/svg','text');
      s.setAttribute('x',nx+8);s.setAttribute('y',ny+n.h<=44?ny+32:ny+34);
      s.setAttribute('class','node-sub');
      s.textContent = n.sub;
      g.appendChild(s);
    }

    // badges
    if(hasBadge){
      const fixCount = (FIXES[n.id]||[]).length;
      const bugCount = (KNOWN_BUGS[n.id]||[]).length;
      let bx = nx+n.w-6;
      if(fixCount>0){
        const b = document.createElementNS('http://www.w3.org/2000/svg','circle');
        b.setAttribute('cx',bx);b.setAttribute('cy',ny+6);
        b.setAttribute('r','8');b.setAttribute('fill','#4ea1ff');
        b.setAttribute('opacity','0.85');
        g.appendChild(b);
        const bt = document.createElementNS('http://www.w3.org/2000/svg','text');
        bt.setAttribute('x',bx);bt.setAttribute('y',ny+9);
        bt.setAttribute('text-anchor','middle');bt.setAttribute('font-size','9');bt.setAttribute('fill','#fff');
        bt.textContent = fixCount;
        g.appendChild(bt);
        bx -= 20;
      }
      if(bugCount>0){
        const b = document.createElementNS('http://www.w3.org/2000/svg','circle');
        b.setAttribute('cx',bx);b.setAttribute('cy',ny+6);
        b.setAttribute('r','8');b.setAttribute('fill','var(--critical)');
        b.setAttribute('opacity','0.85');
        g.appendChild(b);
        const bt = document.createElementNS('http://www.w3.org/2000/svg','text');
        bt.setAttribute('x',bx);bt.setAttribute('y',ny+9);
        bt.setAttribute('text-anchor','middle');bt.setAttribute('font-size','9');bt.setAttribute('fill','#fff');
        bt.textContent = bugCount;
        g.appendChild(bt);
      }
    }

    svgGroup.appendChild(g);
  });

  applyFilter();
}

function clusterX(cid){ return clusters.find(c=>c.id===cid)?.x??0; }
function clusterY(cid){ return clusters.find(c=>c.id===cid)?.y??0; }

function findNodeById(id){ return nodes.find(n=>n.id===id); }

function applyFilter(){
  const activeTags = activeFilter==='all'?chips.map(c=>c.id):[activeFilter,'all'];
  const isRoadmap = activeFilter==='roadmap';

  if(isRoadmap){
    // Dim everything except nodes with fixes/bugs
    document.querySelectorAll('[data-node-id]').forEach(el=>{
      const nid = el.getAttribute('data-node-id');
      const n = findNodeById(nid);
      if(n && (FIXES[n.id]||KNOWN_BUGS[n.id])){
        el.classList.remove('node-dim');
      } else {
        el.classList.add('node-dim');
      }
    });
    return;
  }

  document.querySelectorAll('[data-node-id]').forEach(el=>{
    const nid = el.getAttribute('data-node-id');
    const n = findNodeById(nid);
    if(n && n.tag.some(t=>activeTags.includes(t))){
      el.classList.remove('node-dim');
    } else if(n){
      el.classList.add('node-dim');
    }
  });
}

function renderSidebar(nodeId=null){
  const sb = document.getElementById('sidebar');
  if(!nodeId){
    // Default view with findings
    sb.innerHTML = `
      <div class="default-view">
        <h3>Architecture Map</h3>
        <p>Cyberise RDP Marketplace — pnpm workspace with Express 5 API, React frontend, Prisma/PostgreSQL, Linode VPS provisioning.</p>
        <h4 style="margin-top:16px;color:var(--muted)">Notable Findings</h4>
        <div class="finding"><span class="tag dead">DEAD CODE</span> <strong>Linode getInstance/rebootInstance/getInstanceStats</strong> — 3 exported functions in linode.ts with zero callers. Also banUserSchema and updateOrderSchema in validators/admin.ts.</div>
        <div class="finding"><span class="tag dead">DEAD CODE</span> <strong>RateLimit Prisma model</strong> — Defined in schema.prisma but never used. Rate limiting uses Redis (Upstash) instead.</div>
        <div class="finding"><span class="tag dead">DEAD CODE</span> <strong>incrementRateLimit in redis.ts</strong> — Exported but never called. All rate limiting uses checkRateLimit.</div>
        <div class="finding"><span class="tag hot">HOT PATH</span> <strong>POST /market/order</strong> — Single request touches 5 external services (Clerk auth, Linode API, Redis cache, Resend email, Prisma DB) with no circuit breakers.</div>
        <div class="finding"><span class="tag warn">RISK</span> <strong>Orphaned Linode instances</strong> — If Linode creation succeeds but DB transaction fails, the instance is orphaned (no rollback). Same for failed terminations in cron.ts.</div>
        <div class="finding"><span class="tag warn">RISK</span> <strong>Math.random passwords</strong> — generatePassword uses Math.random not crypto.getRandomValues. Predictable RDP passwords.</div>
        <div class="finding"><span class="tag warn">RISK</span> <strong>Race condition in incrementRateLimit</strong> — INCR + EXPIRE in Redis are two separate commands, not atomic.</div>
        <div class="finding"><span class="tag warn">NOTE</span> <strong>Dual DB concern</strong> — Prisma schema has RateLimit table but app uses Redis for rate limiting. Two parallel rate-limit systems, only one active.</div>
        <div class="finding"><span class="tag note" style="background:#4ea1ff20;color:#4ea1ff">SURPRISE</span> <strong>Resend sends 2 emails per contact</strong> — Contact form sends both business notification AND auto-reply. Only one has XSS escaping.</div>
        <div class="finding"><span class="tag note" style="background:#4ea1ff20;color:#4ea1ff">SURPRISE</span> <strong>Clerk CDN loading</strong> — Frontend loads Clerk JS from jsDelivr CDN rather than npm bundle. Proxy API calls routed through Express.</div>
      </div>`;
    return;
  }
  const n = findNodeById(nodeId);
  if(!n){ sb.innerHTML='<p>Node not found</p>';return; }

  const fixItems = FIXES[n.id]||[];
  const bugItems = KNOWN_BUGS[n.id]||[];
  const incoming = edges.filter(e=>e.to===nodeId);
  const outgoing = edges.filter(e=>e.from===nodeId);

  const badgeHtml = (fixItems.length||bugItems.length)?`
    <div style="display:flex;gap:8px;margin-bottom:12px">
      ${fixItems.length?`<span class="badge fix">${fixItems.length} fix${fixItems.length>1?'es':''}</span>`:''}
      ${bugItems.length?`<span class="badge bug">${bugItems.length} bug${bugItems.length>1?'s':''}</span>`:''}
    </div>`:'';

  const fixesHtml = fixItems.length?`
    <div class="node-section">
      <h4>Fixes</h4>
      <ul class="node-notes">${fixItems.map(f=>`<li>#${f.n} ${f.t}</li>`).join('')}</ul>
    </div>`:'';

  const bugsHtml = bugItems.length?`
    <div class="node-section">
      <h4>Known Bugs</h4>
      <ul class="node-notes">${bugItems.map(b=>`<li><strong style="color:${b.sev==='high'?'var(--critical)':b.sev==='med'?'var(--accent)':'var(--muted)'}">${b.sev.toUpperCase()}</strong> ${b.ref?`<code style="font-size:10px;color:var(--muted)">${b.ref}</code><br/>`:''}${b.t}</li>`).join('')}</ul>
    </div>`:'';

  const edgeList = (list,title)=>{
    if(!list.length) return '';
    const colorMap = {critical:'var(--critical)',api:'var(--external)',db:'var(--db)',mount:'var(--route)',normal:'#444'};
    return `<div class="node-section"><h4>${title} (${list.length})</h4>
      <ul class="edge-list">${list.map(e=>`<li><span class="edge-dot" style="background:${colorMap[e.kind]||'#444'}"></span> ${e.label.replace(/\n/g,' → ')} <span style="color:var(--muted);font-size:10px">→ ${e.to===nodeId?findNodeById(e.from)?.label:e.to}</span></li>`).join('')}</ul></div>`;
  };

  sb.innerHTML = `
    <div>
      <div class="node-title">${n.label}</div>
      ${n.sub?`<div style="color:var(--muted);font-size:12px;margin-top:2px">${n.sub}</div>`:''}
      ${badgeHtml}
    </div>
    ${n.path?`<div class="node-path">${n.path}</div>`:''}
    ${n.role?`<div class="node-section"><h4>What It Does</h4><p style="font-size:12px;line-height:1.5">${n.role}</p></div>`:''}
    ${n.plain?`<div class="node-section"><h4>Plain English</h4><p style="font-size:12px;line-height:1.5;color:var(--muted)">${n.plain}</p></div>`:''}
    ${n.notes?.length?`<div class="node-section"><h4>Notes</h4><ul class="node-notes">${n.notes.map(note=>`<li>${note}</li>`).join('')}</ul></div>`:''}
    ${FIXES[n.id]?.length?fixesHtml:''}
    ${KNOWN_BUGS[n.id]?.length?bugsHtml:''}
    ${edgeList(outgoing,'Outgoing')}
    ${edgeList(incoming,'Incoming')}
  `;
}

// ===== INTERACTIONS =====
function setupInteractions(){
  // Pan + zoom
  const container = document.getElementById('svg-container');
  let isPanning = false, startX, startY;
  let lastTransform = {x:0,y:0};

  container.addEventListener('mousedown',e=>{
    if(e.target.closest('.node-rect')) return;
    if(e.target.tagName==='text'&&e.target.closest('g')?.querySelector('.node-rect')) return;
    isPanning=true;startX=e.clientX-lastTransform.x;startY=e.clientY-lastTransform.y;
    container.style.cursor='grabbing';
  });
  window.addEventListener('mousemove',e=>{
    if(!isPanning) return;
    lastTransform.x=e.clientX-startX;lastTransform.y=e.clientY-startY;
    updateTransform();
  });
  window.addEventListener('mouseup',()=>{
    isPanning=false;container.style.cursor='grab';
  });

  container.addEventListener('wheel',e=>{
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const ds = e.deltaY>0?0.9:1.1;
    const newScale = Math.max(0.2,Math.min(3,scale*ds));
    lastTransform.x += (mx-lastTransform.x)*(1-newScale/scale);
    lastTransform.y += (my-lastTransform.y)*(1-newScale/scale);
    scale = newScale;
    updateTransform();
  },{passive:false});

  // Click handling
  svg.addEventListener('click',e=>{
    const rect = e.target.closest('.node-rect');
    if(rect){
      const nid = rect.getAttribute('data-node-id');
      selectNode(nid);
    } else {
      selectNode(null);
    }
  });

  // Hover
  svg.addEventListener('mouseover',e=>{
    const rect = e.target.closest('.node-rect');
    if(rect){
      const nid = rect.getAttribute('data-node-id');
      renderSidebar(nid);
    }
  });
  svg.addEventListener('mouseout',e=>{
    const rect = e.target.closest('.node-rect');
    if(rect && !selectedNodeId){
      renderSidebar();
    }
  });

  // Zoom controls
  document.getElementById('zoom-in').addEventListener('click',()=>{
    scale=Math.min(3,scale*1.2);updateTransform();
  });
  document.getElementById('zoom-out').addEventListener('click',()=>{
    scale=Math.max(0.2,scale/1.2);updateTransform();
  });
  document.getElementById('fit-btn').addEventListener('click',()=>{
    scale=1;lastTransform={x:0,y:0};updateTransform();
  });

  // Toolbar chips
  chips.forEach(chip=>{
    const el = document.createElement('div');
    el.className = 'chip'+(chip.default?' active':'');
    el.textContent = chip.label;
    el.addEventListener('click',()=>{
      document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
      el.classList.add('active');
      activeFilter=chip.id;
      renderAll();
      renderSidebar(selectedNodeId);
    });
    document.getElementById('toolbar').appendChild(el);
  });
}

function selectNode(nid){
  selectedNodeId = nid;
  renderSidebar(nid);
  if(!nid){
    document.querySelectorAll('.node-rect').forEach(r=>r.setAttribute('opacity','1'));
    return;
  }
  document.querySelectorAll('.node-rect').forEach(r=>{
    r.setAttribute('opacity',r.getAttribute('data-node-id')===nid?'1':'0.25');
  });
}

function updateTransform(){
  svgGroup.setAttribute('transform',`translate(${lastTransform.x},${lastTransform.y}) scale(${scale})`);
}

init();
</script>
