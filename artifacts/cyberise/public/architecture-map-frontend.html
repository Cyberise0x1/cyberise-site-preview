<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Architecture Map — Cyberise Frontend</title>
<style>
:root {
  --bg: #0F0F0F;
  --panel: #161616;
  --panel-2: #1c1c1c;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --muted: #8a8a8a;
  --client: #4ea1ff;
  --route: #7bd389;
  --service: #c792ea;
  --db: #ffb86b;
  --external: #ff6b9d;
  --critical: #ff3860;
  --accent: #f5b942;
  --accent-2: #ff7a45;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; overflow:hidden; height:100vh; display:flex; }
#sidebar { width:320px; min-width:320px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
#sidebar h2 { padding:20px 20px 12px; font-size:16px; font-weight:600; color:var(--text); }
#sidebar .desc { padding:0 20px 12px; font-size:12px; color:var(--muted); line-height:1.5; }
#chips { padding:0 20px 12px; display:flex; flex-wrap:wrap; gap:6px; }
.chip { padding:4px 10px; border-radius:12px; font-size:11px; cursor:pointer; background:var(--panel-2); color:var(--muted); border:1px solid var(--border); transition:all 0.15s; }
.chip.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
#details-area { padding:0 20px 20px; flex:1; overflow-y:auto; }
#details-area h3 { font-size:14px; margin-bottom:6px; color:var(--accent); }
#details-area .detail-row { font-size:12px; color:var(--muted); margin-bottom:4px; line-height:1.4; }
#details-area .detail-row span { color:var(--text); }
#details-area .detail-notes { margin-top:10px; padding:10px; background:var(--panel-2); border-radius:6px; font-size:11px; color:var(--muted); line-height:1.5; }
#canvas-wrap { flex:1; position:relative; overflow:hidden; cursor:grab; }
#canvas-wrap:active { cursor:grabbing; }
svg { width:100%; height:100%; }
.node { cursor:pointer; transition:opacity 0.2s; }
.node rect { stroke-width:1.5px; rx:6; ry:6; }
.node text.label { font-size:11px; font-weight:600; fill:var(--text); pointer-events:none; }
.node text.sub { font-size:9px; fill:var(--muted); pointer-events:none; }
.node.dimmed { opacity:0.15; }
.node.selected rect { stroke:var(--accent); stroke-width:2.5px; filter:drop-shadow(0 0 8px var(--accent)); }
.edge { fill:none; stroke:var(--muted); stroke-width:1; }
.edge.dimmed { opacity:0.05; }
.edge.critical { stroke:var(--critical); stroke-width:2; }
.edge-label { font-size:9px; fill:var(--muted); pointer-events:none; }
.critical-badge { fill:var(--critical); font-size:7px; font-weight:700; pointer-events:none; }
.cluster-label text { font-size:10px; fill:var(--muted); text-transform:uppercase; letter-spacing:1.5px; }
.cluster-label line { stroke:var(--border); stroke-width:1; }
.cluster-bg { fill:var(--panel-2); stroke:var(--border); stroke-width:1; rx:8; }
</style>
</head>

  {from:'page-admin-l',to:'page-admin-o',kind:'route',label:'/admin/orders',tag:['all','admin']},

  {from:'page-orders',to:'state-api',kind:'call',label:'API requests',tag:['all','orders']},

const FIXES = {
  'clerk-cdn-url': 'Clerk clerkJSUrl points to jsdelivr CDN in main.tsx. If CDN blocked or URL changes, auth silently breaks. Verify the exact URL.',

// --- Layout engine ---
function applyOffsets() {
  clusters.forEach(c => {
    nodes.filter(n => n.cluster === c.id).forEach(n => {
      n.x = c.x + n.x + 15;
      n.y = c.y + n.y + 35;
    });
  });
  clusters.forEach(c => {
    const cnodes = nodes.filter(n => n.cluster === c.id);
    if (cnodes.length) {
      const maxY = Math.max(...cnodes.map(n => n.y + n.h));
      c.h = maxY - c.y + 15;
    }
  });
  // Override specific cluster heights
  clusters.find(c => c.id === 'entry').h = 180;
  clusters.find(c => c.id === 'pages').h = 520;
  clusters.find(c => c.id === 'components').h = 500;
  clusters.find(c => c.id === 'state-auth').h = 190;
  clusters.find(c => c.id === 'api-client').h = 190;
  clusters.find(c => c.id === 'external').h = 190;
}

applyOffsets();

// --- Active filter ---
let activeFilter = 'all';

function setFilter(tag) {
  activeFilter = tag;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.tag === tag));
  render();
}

function nodeMatchesFilter(n) {
  if (activeFilter === 'all') return true;
  return n.tag && n.tag.includes(activeFilter);
}

// --- Selection ---
let selectedNodeId = null;
function selectNode(id) {
  selectedNodeId = selectedNodeId === id ? null : id;
  render();
  updateDetails();
}

// --- Pan/zoom ---
let tx = 0, ty = 0, scale = 1;
let dragging = false, dragX, dragY;

const wrap = document.getElementById('canvas-wrap');
const svgEl = document.getElementById('svg');

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const ds = e.deltaY < 0 ? 1.1 : 0.9;
  const newScale = Math.max(0.2, Math.min(3, scale * ds));
  tx = mx - (mx - tx) * (newScale / scale);
  ty = my - (my - ty) * (newScale / scale);
  scale = newScale;
  render();
});

wrap.addEventListener('mousedown', e => {
  if (e.target === wrap || e.target === svgEl) {
    dragging = true; dragX = e.clientX - tx; dragY = e.clientY - ty;
  }
});

window.addEventListener('mousemove', e => {
  if (dragging) { tx = e.clientX - dragX; ty = e.clientY - dragY; render(); }
});

window.addEventListener('mouseup', () => { dragging = false; });

// --- Rendering ---
function render() {
  const svg = document.getElementById('svg');
  let html = `<g transform="translate(${tx},${ty}) scale(${scale})">`;

  // Cluster backgrounds
  clusters.forEach(c => {
    html += `<rect class="cluster-bg" x="${c.x}" y="${c.y}" width="${c.w}" height="${c.h}" rx="8"/>`;
  });

  // Cluster labels
  clusters.forEach(c => {
    html += `<g class="cluster-label">
      <line x1="${c.x}" y1="${c.y + 7}" x2="${c.x + c.w}" y2="${c.y + 7}"/>
      <text x="${c.x + 8}" y="${c.y - 6}">${c.label}</text>
    </g>`;
  });

  // Edges
  const selectedSet = new Set();
  if (selectedNodeId) {
    selectedSet.add(selectedNodeId);
    edges.forEach(e => {
      if (e.from === selectedNodeId) selectedSet.add(e.to);
      if (e.to === selectedNodeId) selectedSet.add(e.from);
    });
  }

  const relevantEdges = edges.filter(e => {
    if (activeFilter !== 'all') return e.tag && e.tag.includes(activeFilter);
    if (selectedNodeId) return e.from === selectedNodeId || e.to === selectedNodeId;
    return true;
  });

  relevantEdges.forEach(e => {
    const from = nodes.find(n => n.id === e.from);
    const to = nodes.find(n => n.id === e.to);
    if (!from || !to) return;

    const x1 = from.x + from.w;
    const y1 = from.y + from.h / 2;
    const x2 = to.x;
    const y2 = to.y + to.h / 2;
    const cx1 = x1 + Math.abs(x2 - x1) * 0.4;
    const cx2 = x2 - Math.abs(x2 - x1) * 0.4;

    const dimmed = selectedNodeId && !selectedSet.has(e.from) && !selectedSet.has(e.to);
    const isCritical = e.critical;
    const cls = ['edge', dimmed ? 'dimmed' : '', isCritical ? 'critical' : ''].filter(Boolean).join(' ');
    const marker = isCritical ? 'url(#arrowhead-critical)' : 'url(#arrowhead)';

    html += `<path class="${cls}" d="M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}" marker-end="${marker}"/>`;

    const lx = (x1 + x2) / 2;
    const ly = (y1 + y2) / 2 - 6;
    html += `<text class="edge-label" x="${lx}" y="${ly}" text-anchor="middle">${e.label}</text>`;
  });

  // Nodes
  const relevantNodes = nodes.filter(n => nodeMatchesFilter(n));

  relevantNodes.forEach(n => {
    const selected = n.id === selectedNodeId;
    const dimmed = selectedNodeId && !selectedSet.has(n.id);
    const isCritical = n.critical;
    const fill = `var(--${n.color})`;

    html += `<g class="node${selected ? ' selected' : ''}${dimmed ? ' dimmed' : ''}" data-id="${n.id}" onclick="selectNode('${n.id}')">
      <rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" fill="var(--panel-2)" stroke="${fill}" rx="6"/>
      <text class="label" x="${n.x + n.w/2}" y="${n.y + 16}" text-anchor="middle">${n.label}</text>
      <text class="sub" x="${n.x + n.w/2}" y="${n.y + 30}" text-anchor="middle">${n.sub}</text>`;

    if (isCritical) {
      html += `<text class="critical-badge" x="${n.x + n.w - 6}" y="${n.y + 10}" text-anchor="end">✦</text>`;
    }
    html += `</g>`;
  });

  html += `</g>`;
  svg.innerHTML = html;
}

// --- Details panel ---
function updateDetails() {
  const area = document.getElementById('details-area');
  if (!selectedNodeId) {
    area.innerHTML = '<div style="color:var(--muted);font-size:12px;padding-top:10px;">Click a node to see details</div>';
    return;
  }
  const n = nodes.find(x => x.id === selectedNodeId);
  if (!n) return;

  let html = `<h3>${n.label}</h3>`;
  html += `<div class="detail-row">Path: <span>${n.path || 'N/A'}</span></div>`;
  html += `<div class="detail-row">Cluster: <span>${n.cluster}</span></div>`;
  if (n.tag) html += `<div class="detail-row">Tags: <span>${n.tag.join(', ')}</span></div>`;
  if (n.critical) html += `<div class="detail-row" style="color:var(--critical);">Critical path ✦</div>`;
  if (n.notes) html += `<div class="detail-notes">${n.notes}</div>`;
  area.innerHTML = html;
}

// --- Chips ---
const chipArea = document.getElementById('chips');
const allTags = ['all','market','orders','admin','auth','comms','landing','visual','infra'];
allTags.forEach(t => {
  const chip = document.createElement('span');
  chip.className = 'chip' + (t === 'all' ? ' active' : '');
  chip.textContent = t;
  chip.dataset.tag = t;
  chip.onclick = () => setFilter(t);
  chipArea.appendChild(chip);
});

// --- Keyboard ---
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') { selectedNodeId = null; render(); updateDetails(); }
});

// --- Initial render ---
render();

console.log('Frontend Architecture Map: nodes=' + nodes.length + ', edges=' + edges.length);
</script>
</body>
</html>
