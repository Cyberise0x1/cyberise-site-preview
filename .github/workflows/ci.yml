name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  TypeCheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd lib/db && pnpm run generate
      - run: pnpm run typecheck

  Lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,md}"

  Build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PORT: "3000"
      BASE_PATH: "/"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd lib/db && pnpm run generate
      - run: pnpm run build

  Test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd lib/db && pnpm run generate
      - run: pnpm --filter @workspace/api-server run test

  Secret-Scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan git history for leaked secrets
        run: |
          PATTERNS=(
            "sk_live_[a-zA-Z0-9]{20,}"
            "vcp_[a-zA-Z0-9]{40,}"
            "gho_[a-zA-Z0-9]{30,}"
            "ghp_[a-zA-Z0-9]{30,}"
          )
          FAILED=0
          for pattern in "${PATTERNS[@]}"; do
            if git log --all -p | grep -qE "$pattern"; then
              echo "FAIL: found potential secret matching pattern: $pattern"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Secret scan failed — leaked secrets found in git history."
            exit 1
          fi
          echo "Secret scan passed — no secrets found in git history."
