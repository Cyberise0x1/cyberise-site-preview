kind = "web"
previewPath = "/"
title = "Cyberise Technology"
version = "1.0.0"
id = "artifacts/cyberise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22231

[services.development]
run = "pnpm --filter @workspace/cyberise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyberise", "run", "build" ]
publicDir = "artifacts/cyberise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22231"
BASE_PATH = "/"
